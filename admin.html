<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SunTime | Вход, магазин и Telegram связь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #0a070c;
            background-image: radial-gradient(circle at 10% 20%, rgba(180, 70, 70, 0.08) 2px, transparent 2px);
            background-size: 35px 35px;
            color: #f0eef7;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .main-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            background: #0f0b12;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            border: 1px solid #2a1f2a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .role-badge {
            background: #2a1f2a;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .admin-badge {
            background: #ff6644;
            color: white;
        }

        .btn-logout {
            background: #2a1f2a;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }

        /* форма входа/регистрации */
        .auth-card {
            max-width: 450px;
            margin: 0 auto;
            background: #0f0b12;
            border-radius: 48px;
            padding: 2rem;
            border: 1px solid #ff8866;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2a1f2a;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            cursor: pointer;
            color: #8899bb;
            font-weight: 500;
        }

        .tab.active {
            color: #ffaa66;
            border-bottom: 2px solid #ffaa66;
        }

        input {
            width: 100%;
            background: #1a1522;
            border: 1px solid #2a1f2a;
            padding: 0.9rem;
            border-radius: 60px;
            color: white;
            margin-bottom: 1rem;
        }

        .btn {
            width: 100%;
            background: #ff6644;
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .error {
            color: #ff8866;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        /* магазин */
        .sale-header {
            text-align: center;
            margin: 2rem 0;
        }

        .sale-badge {
            display: inline-block;
            background: #ff6644;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            font-weight: bold;
        }

        .sale-title {
            font-size: 2rem;
            margin: 1rem 0;
            background: linear-gradient(135deg, #ffaa66, #ff6644);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .donate-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0;
        }

        .donate-card {
            background: #0f0b12;
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid #2a1f2a;
            transition: 0.2s;
            position: relative;
        }

        .donate-card:hover {
            border-color: #ff8866;
            transform: translateY(-4px);
        }

        .sale-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ff6644;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.7rem;
        }

        .rank-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .price {
            font-size: 1.6rem;
            color: #ffaa66;
            margin: 0.5rem 0;
        }

        .old-price {
            font-size: 1rem;
            text-decoration: line-through;
            color: #886666;
            margin-right: 0.5rem;
        }

        .perks {
            list-style: none;
            margin: 1rem 0;
        }

        .perks li {
            margin: 0.4rem 0;
            font-size: 0.85rem;
        }

        .buy-btn {
            background: #ff6644;
            border: none;
            width: 100%;
            padding: 0.7rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }

        .cart-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f0b12;
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            border: 1px solid #ff8866;
            cursor: pointer;
            z-index: 100;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .cart-content {
            background: #0f0b12;
            border-radius: 32px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
        }

        /* Telegram блок */
        .telegram-block {
            background: #1a1522;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #ffaa66;
        }

        .telegram-info {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .telegram-link {
            background: #2a2f4a;
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            color: #ffaa66;
            text-decoration: none;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.7rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="main-container">
    <!-- верхняя панель (видна только после входа) -->
    <div id="topBar" class="top-bar hidden">
        <div class="user-info">
            <span>👤</span>
            <span id="topUserName">Nowkie</span>
            <div class="role-badge" id="topUserRole">Пользователь</div>
        </div>
        <button class="btn-logout" id="logoutBtn">Выйти</button>
    </div>

    <!-- экран входа/регистрации -->
    <div id="authScreen" class="auth-card">
        <div class="tabs">
            <div class="tab active" data-tab="login">Вход</div>
            <div class="tab" data-tab="register">Регистрация</div>
        </div>
        <div id="loginForm">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPassword" placeholder="Пароль">
            <button class="btn" id="loginBtn">Войти</button>
            <div id="loginError" class="error"></div>
        </div>
        <div id="registerForm" class="hidden">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPassword" placeholder="Пароль">
            <button class="btn" id="registerBtn">Зарегистрироваться</button>
            <div id="regError" class="error"></div>
        </div>
    </div>

    <!-- МАГАЗИН (доступен после входа) -->
    <div id="shopSection" class="hidden">
        <div class="sale-header">
            <div class="sale-badge">🔥 РАСПРОДАЖА 🔥</div>
            <div class="sale-title">СКИДКА 20% НА ВСЕ ДОНАТЫ</div>
        </div>
        <div class="donate-grid" id="donateGrid"></div>
    </div>

    <!-- Telegram блок (после входа) -->
    <div id="telegramBlock" class="telegram-block hidden">
        <div class="telegram-info">
            <span>📢</span>
            <span>После покупки напишите свой ник в Telegram чат:</span>
        </div>
        <a href="https://t.me/suntimemines" target="_blank" class="telegram-link">📱 @suntimemines</a>
    </div>

    <div id="cartPreview" class="cart-preview hidden">🛒 Корзина (<span id="cartCount">0</span>)</div>
    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <h3>🛒 Корзина</h3>
            <div id="cartItems"></div>
            <div id="cartTotal" style="margin: 1rem 0;"></div>
            <button id="checkoutBtn" class="buy-btn" style="background:#44aa88;">Оформить заказ</button>
            <button id="closeCartBtn" style="background:#333; margin-top: 0.5rem;">Закрыть</button>
        </div>
    </div>

    <footer id="footer" class="hidden">SunTime — магазин привилегий. После покупки напишите ник в @suntimemines</footer>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let users = [
        { username: "Nowkie", password: "admin123", role: "admin" },
        { username: "AlexPro", password: "alex123", role: "user" },
        { username: "MinerGod", password: "miner", role: "user" }
    ];
    let currentUser = null;
    let cart = [];
    const DISCOUNT = 0.20;

    const donateItems = [
        { id: 1, name: "🐍 СКВИД", originalPrice: 199, perks: ["/kit сквид", "Цветной ник", "5 ключей кейсов"] },
        { id: 2, name: "🐉 АСПИД", originalPrice: 399, perks: ["/hat, /craft", "12 ключей", "Эффект частиц"] },
        { id: 3, name: "⚔ ГЕРЦОГ", originalPrice: 699, perks: ["/fly, /feed", "25 кейсов", "Личный сундук"] },
        { id: 4, name: "👑 КНЯЗЬ", originalPrice: 1099, perks: ["/tpa, /back", "45 кейсов", "Префикс &b[КНЯЗЬ]"] }
    ];

    function getDiscountedPrice(original) {
        return Math.floor(original * (1 - DISCOUNT));
    }

    function saveUsers() { localStorage.setItem('suntime_users', JSON.stringify(users)); }
    function loadUsers() {
        const saved = localStorage.getItem('suntime_users');
        if (saved) users = JSON.parse(saved);
    }
    function saveSession() {
        if (currentUser) localStorage.setItem('suntime_session', JSON.stringify(currentUser));
        else localStorage.removeItem('suntime_session');
    }
    function loadSession() {
        const saved = localStorage.getItem('suntime_session');
        if (saved) {
            currentUser = JSON.parse(saved);
            showLoggedInUI();
        }
    }

    function showLoggedInUI() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('topBar').classList.remove('hidden');
        document.getElementById('shopSection').classList.remove('hidden');
        document.getElementById('telegramBlock').classList.remove('hidden');
        document.getElementById('cartPreview').classList.remove('hidden');
        document.getElementById('footer').classList.remove('hidden');
        
        document.getElementById('topUserName').innerText = currentUser.username;
        const roleSpan = document.getElementById('topUserRole');
        if (currentUser.role === 'admin') {
            roleSpan.innerHTML = '👑 Администратор';
            roleSpan.classList.add('admin-badge');
        } else {
            roleSpan.innerHTML = '🛒 Покупатель';
            roleSpan.classList.remove('admin-badge');
        }
        
        renderDonates();
        updateCartUI();
    }

    function showAuthUI() {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('topBar').classList.add('hidden');
        document.getElementById('shopSection').classList.add('hidden');
        document.getElementById('telegramBlock').classList.add('hidden');
        document.getElementById('cartPreview').classList.add('hidden');
        document.getElementById('footer').classList.add('hidden');
    }

    function renderDonates() {
        const grid = document.getElementById('donateGrid');
        grid.innerHTML = donateItems.map(item => {
            const discounted = getDiscountedPrice(item.originalPrice);
            return `
                <div class="donate-card">
                    <div class="sale-tag">-20%</div>
                    <div class="rank-name">${item.name}</div>
                    <div class="price">
                        <span class="old-price">${item.originalPrice} ₽</span>
                        ${discounted} ₽
                    </div>
                    <ul class="perks">
                        ${item.perks.map(p => `<li>✔ ${p}</li>`).join('')}
                    </ul>
                    <button class="buy-btn" data-id="${item.id}">В корзину</button>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.buy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const item = donateItems.find(i => i.id === id);
                if (item) {
                    cart.push({ ...item, finalPrice: getDiscountedPrice(item.originalPrice) });
                    updateCartUI();
                    alert(`✅ ${item.name} добавлен в корзину со скидкой 20%`);
                }
            });
        });
    }

    function updateCartUI() {
        document.getElementById('cartCount').innerText = cart.length;
        const cartItemsDiv = document.getElementById('cartItems');
        const total = cart.reduce((sum, item) => sum + item.finalPrice, 0);
        cartItemsDiv.innerHTML = cart.map((item, idx) => `
            <div style="display: flex; justify-content: space-between; margin: 0.5rem 0;">
                <span>${item.name}</span>
                <span>${item.finalPrice} ₽ <button class="remove-item" data-idx="${idx}" style="background:none; border:none; color:#ff8866;">✖</button></span>
            </div>
        `).join('');
        document.getElementById('cartTotal').innerHTML = `Итого: ${total} ₽ (скидка 20% уже применена)`;
        
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                cart.splice(idx, 1);
                updateCartUI();
            });
        });
    }

    // ========== ВХОД / РЕГИСТРАЦИЯ ==========
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const type = tab.dataset.tab;
            if (type === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        });
    });

    document.getElementById('registerBtn').addEventListener('click', () => {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const errorDiv = document.getElementById('regError');
        if (!username || !password) {
            errorDiv.innerText = 'Заполните все поля';
            return;
        }
        if (users.find(u => u.username === username)) {
            errorDiv.innerText = 'Пользователь уже существует';
            return;
        }
        users.push({ username, password, role: 'user' });
        saveUsers();
        errorDiv.innerText = '';
        alert('Регистрация успешна! Теперь войдите.');
        document.querySelector('.tab[data-tab="login"]').click();
        document.getElementById('loginUsername').value = username;
        document.getElementById('loginPassword').value = '';
    });

    document.getElementById('loginBtn').addEventListener('click', () => {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errorDiv = document.getElementById('loginError');
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) {
            errorDiv.innerText = 'Неверное имя или пароль';
            return;
        }
        errorDiv.innerText = '';
        currentUser = { username: user.username, role: user.role };
        saveSession();
        showLoggedInUI();
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentUser = null;
        cart = [];
        saveSession();
        showAuthUI();
    });

    // корзина
    const modal = document.getElementById('cartModal');
    document.getElementById('cartPreview').addEventListener('click', () => {
        if (currentUser) {
            updateCartUI();
            modal.style.display = 'flex';
        }
    });
    document.getElementById('closeCartBtn').addEventListener('click', () => modal.style.display = 'none');
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (cart.length === 0) {
            alert('Корзина пуста');
            return;
        }
        const total = cart.reduce((s, i) => s + i.finalPrice, 0);
        alert(`✅ Заказ оформлен на сумму ${total} ₽!\n\nВАЖНО: Напишите свой ник (${currentUser.username}) в Telegram чат @suntimemines для получения привилегий.`);
        cart = [];
        updateCartUI();
        modal.style.display = 'none';
    });

    loadUsers();
    loadSession();
    if (!currentUser) showAuthUI();
</script>
</body>
</html>
